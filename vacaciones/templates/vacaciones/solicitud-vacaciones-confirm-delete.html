{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold text-gray-700 mb-4">Confirmar eliminación</h2>
    <p class="text-gray-600 mb-6">
        ¿Estás seguro de que deseas eliminar la solicitud <strong>{{ object.codigo_sabs }}</strong>?
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-4">
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Sí, eliminar</button>
            <a href="{% url 'vacaciones:solicitud-vacaciones-list' %}" class="text-gray-600 hover:underline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
