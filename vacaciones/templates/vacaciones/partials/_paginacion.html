{% if is_paginated %}
<div class="mt-6 flex justify-center items-center gap-2">
  {% if page_obj.has_previous %}
  <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.estado %}&estado={{ request.GET.estado }}{% endif %}" 
     class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors duration-200">
    Anterior
  </a>
  {% else %}
  <span class="px-4 py-2 bg-gray-200 text-gray-400 rounded-md cursor-not-allowed">Anterior</span>
  {% endif %}

  <span class="text-gray-700">
    Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
  <a href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.estado %}&estado={{ request.GET.estado }}{% endif %}" 
     class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors duration-200">
    Siguiente
  </a>
  {% else %}
  <span class="px-4 py-2 bg-gray-200 text-gray-400 rounded-md cursor-not-allowed">Siguiente</span>
  {% endif %}
</div>
{% endif %}
